<!-- Custom: Brain × AI geek theme — violet + electric cyan -->
<style>
  /* ═══ Palette ══════════════════════════════
     violet  #7c3aed   electric-cyan  #22d3ee
     nav bg  #0d0b1a   card glow      violet/15
  ════════════════════════════════════════════ */
  :root {
    --v:  #5b21b6;          /* deep violet */
    --c:  #0e7490;          /* deep cyan */
    --nav: #080614;         /* near-black nav */
    --ink: #0a0a1a;         /* near-black body text */
    --muted: #374151;       /* dark muted text */
    --card-bg: #e8e0f8;     /* stronger violet tint cards */
    --card-s: 0 2px 14px rgba(91,33,182,0.18);
    --card-h: 0 6px 28px rgba(91,33,182,0.32);
  }

  /* ── Fonts ────────────────────────────── */
  body, .page__content, .sidebar, .masthead {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  /* monospace for code-like labels (location, dates) */
  .author__location, .page__meta time,
  .archive__item-excerpt .date {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.78em;
    letter-spacing: 0.03em;
  }

  /* ── Nav bar ──────────────────────────── */
  .masthead {
    background: var(--nav) !important;
    border-bottom: 2px solid rgba(91,33,182,0.6) !important;
  }
  .masthead::after { display: none !important; }

  /* site title: violet → cyan gradient */
  .masthead__menu-item--lg a {
    background: linear-gradient(90deg, var(--v), var(--c));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700 !important;
    letter-spacing: 0.01em;
  }
  .masthead a, .masthead__menu-item a {
    color: rgba(255,255,255,0.95) !important;
    letter-spacing: 0.03em;
    font-size: 0.88em;
  }
  .masthead__menu-item a:hover    { color: var(--c) !important; }
  .masthead__menu-item.selected a {
    color: #fff !important;
    border-bottom: 2px solid var(--c) !important;
  }

  /* ── Page body background ─────────────── */
  body { background: #e4ddf0 !important; } /* deeper violet tint */

  /* ── Hide theme toggle (sun icon) ────── */
  #theme-toggle { display: none !important; }

  /* ── Sidebar ──────────────────────────── */
  .author__avatar img {
    border-radius: 14px !important;
    border: 2px solid rgba(91,33,182,0.45) !important;
    box-shadow: 0 0 0 4px rgba(14,116,144,0.18),
                0 8px 30px rgba(91,33,182,0.30) !important;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .author__avatar img:hover {
    transform: scale(1.03);
    box-shadow: 0 0 0 6px rgba(14,116,144,0.25),
                0 12px 40px rgba(91,33,182,0.40) !important;
  }
  .author__name {
    color: var(--ink) !important;
    font-size: 1.05em !important;
    font-weight: 700 !important;
    letter-spacing: -0.01em;
  }
  .author__bio {
    color: var(--muted) !important;
    font-size: 0.81em !important;
    font-weight: 500;
  }
  .author__urls a {
    color: #111827 !important;
    font-size: 0.82em !important;
    transition: color 0.18s;
  }
  .author__urls a:hover { color: var(--v) !important; }

  /* ── Page title (h1) ──────────────────── */
  .page__title {
    background: linear-gradient(100deg, var(--v) 20%, var(--c) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 800 !important;
    letter-spacing: -0.02em;
  }

  /* ── Section headings (h2) ────────────── */
  .page__content h2 {
    font-size: 0.92em;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2.2em;
    padding-bottom: 0.35em;
    border-bottom: none !important;
    position: relative;
  }
  .page__content h2::after {
    content: "";
    display: block;
    height: 3px;
    margin-top: 0.35em;
    background: linear-gradient(90deg, var(--v), var(--c) 70%, transparent);
    border-radius: 2px;
  }

  /* ── Links ────────────────────────────── */
  .page__content a,
  .page__content a:visited {
    color: var(--v) !important;
    text-decoration: none;
    transition: color 0.18s;
  }
  .page__content a:hover { color: var(--c) !important; }

  /* ── Publication / talk cards ─────────── */
  .archive__item {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 1rem 1.3rem;
    margin-bottom: 1rem;
    box-shadow: var(--card-s);
    border-left: 4px solid var(--v);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }
  /* subtle top glow bar */
  .archive__item::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--v), var(--c));
    opacity: 0;
    transition: opacity 0.25s;
  }
  .archive__item:hover {
    transform: translateY(-3px);
    box-shadow: var(--card-h);
    border-color: var(--c);
  }
  .archive__item:hover::before { opacity: 1; }

  .archive__item-title {
    margin-top: 0 !important;
    font-size: 0.96em !important;
  }
  .archive__item-title a {
    color: var(--ink) !important;
    font-weight: 600;
  }
  .archive__item-title a:hover { color: var(--v) !important; }
  .archive__item-excerpt {
    color: var(--muted);
    font-size: 0.85em !important;
    line-height: 1.6;
  }

  /* ── News / info table ────────────────── */
  .page__content table {
    border: none !important;
    box-shadow: none !important;
    background: transparent !important;
    width: 100%;
  }
  .page__content table thead { display: none; }
  .page__content table td {
    border: none !important;
    padding: 0.3em 0.65em !important;
    background: transparent !important;
    font-size: 0.88em;
    vertical-align: top;
  }
  .page__content table tr:nth-child(odd) td { background: transparent !important; }
  .page__content table td:first-child {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78em;
    font-weight: 600;
    color: var(--c);
    white-space: nowrap;
    min-width: 7em;
    padding-top: 0.45em !important;
  }

  /* ── Footer ───────────────────────────── */
  .page__footer {
    background: var(--nav) !important;
    border-top: 2px solid rgba(91,33,182,0.6) !important;
  }
  .page__footer-copyright, .page__footer a {
    color: rgba(255,255,255,0.5) !important;
  }
  .page__footer a:hover { color: var(--c) !important; }

  /* ── Responsive ───────────────────────── */
  @media (max-width: 768px) {
    .author__avatar img { border-radius: 50% !important; }
  }
</style>
